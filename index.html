<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0010" />

  <!-- Primary SEO -->
  <title>I love you, Belia.</title>
  <meta name="description" content="A billboard of love, dedicated to miss Belia Cain. Forever and always." />
  <link rel="canonical" href="https://beliacain.com/" />

  <!-- Open Graph -->
  <meta property="og:title" content="I love you, Belia." />
  <meta property="og:description" content="A billboard of love, dedicated to miss Belia Cain. Forever and always." />
  <meta property="og:url" content="https://beliacain.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://beliacain.com/preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:alt" content="I love you, Belia." />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="I love you, Belia." />
  <meta name="twitter:description" content="A billboard of love, dedicated to miss Belia Cain. Forever and always." />
  <meta name="twitter:image" content="https://beliacain.com/preview.png" />

  <meta name="robots" content="index,follow" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="Favicon.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="Favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="Favicon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Playfair+Display:ital,wght@1,500;1,600;1,700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --purple: #b14bff;
      --purple-deep: #9900ff;
      --pink: #ff5db1;
      --rose: #ff4d6d;
      --white: #ffffff;
      --muted: #6b6478;
      --ink: #0a0010;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      position: relative;
      min-height: 100svh;
      background: var(--ink);
      color: var(--white);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display",
                   "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }

    /* ---------- Animated aurora background ---------- */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(120% 120% at 50% 120%, #1a0228 0%, #0a0010 55%, #050008 100%);
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.55;
      mix-blend-mode: screen;
      will-change: transform;
    }
    .blob.b1 {
      width: 60vmax; height: 60vmax;
      left: -10vmax; top: -18vmax;
      background: radial-gradient(circle, rgba(177,75,255,0.85), rgba(177,75,255,0) 70%);
      animation: drift1 22s ease-in-out infinite;
    }
    .blob.b2 {
      width: 55vmax; height: 55vmax;
      right: -14vmax; top: 6vmax;
      background: radial-gradient(circle, rgba(255,93,177,0.8), rgba(255,93,177,0) 70%);
      animation: drift2 26s ease-in-out infinite;
    }
    .blob.b3 {
      width: 70vmax; height: 70vmax;
      left: 12vmax; bottom: -28vmax;
      background: radial-gradient(circle, rgba(153,0,255,0.7), rgba(153,0,255,0) 70%);
      animation: drift3 30s ease-in-out infinite;
    }
    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(8vmax, 6vmax) scale(1.12); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1.05); }
      50%     { transform: translate(-9vmax, 8vmax) scale(0.92); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(6vmax, -7vmax) scale(1.15); }
    }

    /* vignette + soft grain for depth */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(120% 90% at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
    }

    /* ---------- Floating hearts canvas ---------- */
    #fx {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: block;
      pointer-events: none;
    }

    /* ---------- Content ---------- */
    main {
      position: relative;
      z-index: 3;
      max-width: 1100px;
    }

    .eyebrow {
      margin: 0 0 22px;
      font-size: clamp(11px, 1.6vw, 13px);
      font-weight: 700;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--pink);
      opacity: 0;
      animation: fadeUp 1s ease-out 0.1s forwards;
    }
    .headline {
      font-weight: 800;
      font-size: clamp(40px, 9.2vw, 116px);
      line-height: 1.02;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .word {
      display: inline-block;
      opacity: 0;
      filter: blur(14px);
      transform: translateY(-46px);
      animation: blurIn 0.85s cubic-bezier(.22,.61,.36,1) forwards;
      animation-delay: var(--d, 0s);
      will-change: transform, filter, opacity;
    }

    /* Her name — elegant serif with a living gradient + glow */
    .name {
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-style: italic;
      font-weight: 600;
      letter-spacing: 0.005em;
      padding: 0 0.06em;
      background: linear-gradient(100deg, #ff8ad8, #b14bff 40%, #ff5db1 70%, #ffb3e6);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      filter: drop-shadow(0 6px 34px rgba(177, 75, 255, 0.55));
    }
    /* shimmer runs only after the reveal settles */
    .name.lit {
      animation: blurIn 0.85s cubic-bezier(.22,.61,.36,1) forwards,
                 shimmer 7s ease-in-out 1.2s infinite;
    }

    @keyframes blurIn {
      0%   { opacity: 0; filter: blur(14px); transform: translateY(-46px); }
      60%  { opacity: 0.6; filter: blur(5px); transform: translateY(6px); }
      100% { opacity: 1; filter: blur(0);    transform: translateY(0); }
    }
    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50%     { background-position: 100% 50%; }
    }

    .note {
      margin: 30px auto 0;
      min-height: 3em;
      max-width: 44ch;
      font-size: clamp(15px, 2.4vw, 21px);
      font-weight: 400;
      line-height: 1.55;
      color: #e9e2f2;
      opacity: 0;
      animation: fadeUp 1s ease-out 0.95s forwards;
    }
    .note .rot {
      display: inline-block;
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .note .rot.out { opacity: 0; transform: translateY(8px); }
    .note .accent {
      background: linear-gradient(100deg, #ff8ad8, #b14bff 45%, #ff5db1 78%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      font-weight: 600;
      filter: drop-shadow(0 2px 14px rgba(177, 75, 255, 0.35));
    }

    /* tap hint */
    .hint {
      position: fixed;
      left: 50%;
      bottom: 64px;
      transform: translateX(-50%);
      z-index: 3;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 1.2s ease-out 2.2s forwards, floaty 3s ease-in-out 2.2s infinite;
      transition: opacity 0.5s ease;
    }
    .hint.gone { opacity: 0 !important; pointer-events: none; }

    /* footer link */
    .footer-link {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 18px;
      z-index: 3;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-decoration: none;
      opacity: 0.55;
      transition: color 0.3s ease, opacity 0.3s ease;
    }
    .footer-link:hover { color: var(--white); opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floaty {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%     { transform: translateX(-50%) translateY(-6px); }
    }

    @media (max-width: 520px) {
      .hint { bottom: 58px; }
      .eyebrow { letter-spacing: 0.34em; }
    }

    /* ---------- Respect reduced motion ---------- */
    @media (prefers-reduced-motion: reduce) {
      .blob { animation: none !important; }
      .word, .name.lit, .name { animation: none !important; opacity: 1 !important; filter: none !important; transform: none !important; }
      .eyebrow, .note, .hint, .footer-link { animation: none !important; opacity: 1 !important; transform: translateX(-50%); }
      .eyebrow, .note { transform: none; opacity: 1 !important; }
      .footer-link, .hint { transform: translateX(-50%); }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <canvas id="fx" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <main>
    <p class="eyebrow">The World Is Yours</p>

    <h1 class="headline">
      <span class="word" style="--d:0s">I</span>&nbsp;<span class="word" style="--d:.12s">love</span>&nbsp;<span class="word" style="--d:.24s">you,</span>&nbsp;<span class="word name lit" style="--d:.4s">Belia</span><span class="word" style="--d:.56s">.</span>
    </h1>

    <p class="note"><span class="rot" id="rot">I write this for <span class="accent">you</span>.</span></p>
  </main>

  <div class="hint" id="hint">tap anywhere ♡</div>

  <a href="https://drozq.com" class="footer-link" target="_blank" rel="noopener noreferrer">drozq.com</a>

  <script>
  (function () {
    "use strict";
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* ---------- Rotating quotes ---------- */
    var quotes = [
      {text:`ya no llores, ya no temas.`,accent:`.`},
      {text:`I write this for you.`,accent:`you`},
      {text:`I can't hold enough of you in my hands.`,accent:`hands`},
      {text:`I hope I am more than a person to you, but a concept.`,accent:`concept`},
      {text:`I'll find you in these waters.`,accent:`waters`},
      {text:`Once then we'll be free.`,accent:`free`},
      {text:`May your desire be greater than your obstacles.`,accent:`greater than`},
      {text:`Something to hold when there is nothing to say.`,accent:`nothing`},
      {text:`I mourn your absence.`,accent:`absence`},
      {text:`I wish I was kinder to you.`,accent:`.`},
      {text:`I steal a few breaths from the world for a minute.`,accent:`for a minute`},
      {text:`Winter took more than the flowers.`,accent:`.`},
      {text:`The february hills are green.`,accent:`green`},
      {text:`The december hills are green.`,accent:`green`},
      {text:`I touched the sun with borrowed hands.`,accent:`hands`},
      {text:`I feel saturated by it.`,accent:`saturated`},
      {text:`Retain the dreams you believe are worth suffering for.`,accent:`suffering`},
      {text:`My flesh decays with each passing second.`,accent:`second`}
    ];
    // Fisher-Yates shuffle so each visit differs
    for (var sx = quotes.length - 1; sx > 0; sx--) {
      var sk = Math.floor(Math.random() * (sx + 1));
      var stmp = quotes[sx]; quotes[sx] = quotes[sk]; quotes[sk] = stmp;
    }
    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function renderQuote(q) {
      var t = q.text, a = q.accent || "";
      var idx = a ? t.indexOf(a) : -1;
      if (idx === -1) return escapeHtml(t);
      return escapeHtml(t.slice(0, idx)) +
        '<span class="accent">' + escapeHtml(t.slice(idx, idx + a.length)) + "</span>" +
        escapeHtml(t.slice(idx + a.length));
    }
    var rot = document.getElementById("rot");
    if (rot && !reduce) {
      var qi = 0;
      // open on a random (shuffled) line so every visit starts differently
      rot.innerHTML = renderQuote(quotes[qi]);
      qi = (qi + 1) % quotes.length;
      setInterval(function () {
        rot.classList.add("out");
        setTimeout(function () {
          rot.innerHTML = renderQuote(quotes[qi]);
          rot.classList.remove("out");
          qi = (qi + 1) % quotes.length;
        }, 600);
      }, 4600);
    }

    /* ---------- Floating hearts on canvas ---------- */
    var canvas = document.getElementById("fx");
    var ctx = canvas.getContext("2d");
    var W = 0, H = 0, DPR = 1;
    var COLORS = ["#ff5db1", "#b14bff", "#ff4d6d", "#9900ff", "#ff8ad8", "#ffffff"];

    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    window.addEventListener("resize", resize);

    function rand(a, b) { return a + Math.random() * (b - a); }

    function heartPath(s) {
      // unit-ish heart, point at bottom; s = size
      var t = s * 0.3;
      ctx.beginPath();
      ctx.moveTo(0, t);
      ctx.bezierCurveTo(0, 0, -s / 2, 0, -s / 2, t);
      ctx.bezierCurveTo(-s / 2, s * 0.62, 0, s * 0.82, 0, s);
      ctx.bezierCurveTo(0, s * 0.82, s / 2, s * 0.62, s / 2, t);
      ctx.bezierCurveTo(s / 2, 0, 0, 0, 0, t);
      ctx.closePath();
    }

    function makeHeart(x, y, opts) {
      opts = opts || {};
      var burst = !!opts.burst;
      return {
        x: x, y: y,
        size: opts.size != null ? opts.size : rand(9, 22),
        vx: opts.vx != null ? opts.vx : rand(-8, 8),
        vy: opts.vy != null ? opts.vy : rand(-32, -64),
        gravity: burst ? rand(14, 26) : rand(-2, 2),
        rot: rand(-0.5, 0.5),
        vr: rand(-0.8, 0.8),
        color: opts.color || COLORS[(Math.random() * COLORS.length) | 0],
        peak: opts.peak != null ? opts.peak : (burst ? rand(0.65, 0.95) : rand(0.25, 0.6)),
        alpha: 0,
        life: 0,
        maxLife: opts.maxLife != null ? opts.maxLife : (burst ? rand(1.8, 3.0) : rand(7, 13)),
        swayAmp: burst ? rand(2, 8) : rand(6, 20),
        swaySpeed: rand(0.5, 1.5),
        swayPhase: rand(0, Math.PI * 2),
        burst: burst
      };
    }

    var hearts = [];
    var MAX = Math.max(14, Math.min(40, Math.round(W / 42)));
    var spawnEvery = 0.42;
    var spawnAcc = 0;
    var last = (window.performance && performance.now) ? performance.now() : 0;

    function spawnAmbient() {
      if (hearts.length < MAX) {
        hearts.push(makeHeart(rand(0, W), H + 28));
      }
    }

    function burstAt(x, y) {
      var n = 16;
      for (var k = 0; k < n; k++) {
        var ang = (Math.PI * 2 * k) / n + rand(-0.2, 0.2);
        var sp = rand(60, 150);
        hearts.push(makeHeart(x, y, {
          burst: true,
          size: rand(12, 26),
          vx: Math.cos(ang) * sp,
          vy: Math.sin(ang) * sp - 30
        }));
      }
      // keep the array from growing unbounded
      if (hearts.length > 240) hearts.splice(0, hearts.length - 240);
    }

    function update(p, dt) {
      p.life += dt;
      p.swayPhase += dt * p.swaySpeed;
      p.x += (p.vx + Math.sin(p.swayPhase) * p.swayAmp) * dt;
      p.y += p.vy * dt;
      p.vy += p.gravity * dt;
      if (p.burst) p.vx *= (1 - 0.9 * dt); // air drag for bursts
      p.rot += p.vr * dt;

      var t = p.life, L = p.maxLife, a = p.peak;
      if (t < 0.7) a *= t / 0.7;
      if (t > L - 1.4) a *= Math.max(0, (L - t) / 1.4);
      p.alpha = a < 0 ? 0 : a;
    }

    function frame(now) {
      var dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      ctx.clearRect(0, 0, W, H);

      spawnAcc += dt;
      while (spawnAcc > spawnEvery) { spawnAcc -= spawnEvery; spawnAmbient(); }

      for (var i = hearts.length - 1; i >= 0; i--) {
        var p = hearts[i];
        update(p, dt);
        if (p.life >= p.maxLife || p.y < -60) { hearts.splice(i, 1); continue; }

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = p.size * 0.7;
        heartPath(p.size);
        ctx.fill();
        ctx.restore();
      }
      requestAnimationFrame(frame);
    }

    if (!reduce) {
      // seed a few so it isn't empty on load
      for (var s = 0; s < Math.round(MAX * 0.6); s++) {
        var h = makeHeart(rand(0, W), rand(0, H));
        h.life = rand(0, 3);
        hearts.push(h);
      }
      requestAnimationFrame(frame);
    }

    /* ---------- Tap / click to burst hearts ---------- */
    var hint = document.getElementById("hint");
    var hinted = false;
    function onTap(e) {
      var x, y;
      if (e.touches && e.touches[0]) { x = e.touches[0].clientX; y = e.touches[0].clientY; }
      else { x = e.clientX; y = e.clientY; }
      if (x == null) { x = W / 2; y = H / 2; }
      if (!reduce) burstAt(x, y);
      if (!hinted && hint) { hinted = true; hint.classList.add("gone"); }
    }
    window.addEventListener("pointerdown", onTap, { passive: true });

    // auto-hide the hint after a while even without interaction
    setTimeout(function () { if (hint && !hinted) hint.classList.add("gone"); }, 9000);
  })();
  </script>
</body>
</html>
